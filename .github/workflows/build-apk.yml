name: 📱 Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate app icons
        run: |
          sudo apt-get install -y librsvg2-bin 2>/dev/null || true
          SVG="public/icon.svg"
          RES="android/app/src/main/res"
          echo "Generating icons..."
          for ENTRY in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="${ENTRY%%:*}"
            SIZE="${ENTRY##*:}"
            mkdir -p "$RES/$DIR"
            rsvg-convert -w $SIZE -h $SIZE "$SVG" > "$RES/$DIR/ic_launcher.png" && \
              cp "$RES/$DIR/ic_launcher.png" "$RES/$DIR/ic_launcher_round.png" && \
              echo "  ✓ $DIR (${SIZE}px)" || echo "  ⚠ $DIR skipped"
          done
          for ENTRY in "mipmap-mdpi:108" "mipmap-hdpi:162" "mipmap-xhdpi:216" "mipmap-xxhdpi:324" "mipmap-xxxhdpi:432"; do
            DIR="${ENTRY%%:*}"
            SIZE="${ENTRY##*:}"
            mkdir -p "$RES/$DIR"
            rsvg-convert -w $SIZE -h $SIZE "$SVG" > "$RES/$DIR/ic_launcher_foreground.png" || true
          done
          echo "Icons complete"

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <application|' "$MANIFEST"
          fi
          if ! grep -q "largeHeap" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name" android:largeHeap="true" android:hardwareAccelerated="true"|' "$MANIFEST"
          fi

      - name: Set app name
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          [ -f "$STRINGS" ] && sed -i 's|<string name="app_name">.*</string>|<string name="app_name">CodeAI IDE</string>|' "$STRINGS" || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Rename APK
        id: rename
        run: |
          BUILD_DATE=$(date +%Y%m%d-%H%M)
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="CodeAI-IDE-${BUILD_DATE}-${SHORT_SHA}.apk"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeAI-IDE-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
