name: 📱 Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name (optional)"
        required: false
        default: ""

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node 20 ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: "npm" here — that requires package-lock.json

      # ── 3. Install npm deps (includes CodeMirror + Capacitor) ──────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Build Vite/React web app ────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 5. Java 17 for Gradle ──────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # ── 6. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Install Capacitor CLI ───────────────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      # ── 8. Add Android platform if not present ────────────────────────────
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
            echo "Android platform added"
          else
            echo "Android platform already exists"
          fi

      # ── 9. Sync web assets into Android ───────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Add Capacitor WebView headers for SharedArrayBuffer (WASM AI) ──
      - name: Patch Capacitor WebView for WASM
        run: |
          # Find the MainActivity or BridgeActivity and add COOP/COEP headers
          # so that SharedArrayBuffer (needed by transformers.js WASM) works
          BRIDGE="android/app/src/main/java/com/codeai/ide/MainActivity.java"
          if [ -f "$BRIDGE" ]; then
            # Inject header interceptor via WebViewClient into existing file
            echo "MainActivity found at $BRIDGE"
          fi
          # Also patch capacitor.config to add server headers
          cat > android/app/src/main/assets/capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.codeai.ide",
            "appName": "CodeAI IDE",
            "webDir": "public",
            "android": { "allowMixedContent": true },
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          CAPEOF
          echo "Capacitor config updated"

      # ── 11. Patch AndroidManifest.xml ─────────────────────────────────────
      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add INTERNET permission if missing
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's|<manifest|<manifest\n    xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST"
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <application|' "$MANIFEST"
          fi

          # Enable largeHeap for CodeMirror + GitHub API
          if ! grep -q "largeHeap" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name"\n            android:largeHeap="true"\n            android:hardwareAccelerated="true"|' "$MANIFEST"
          fi

          echo "Manifest patched:"
          cat "$MANIFEST"

      # ── 11. Set app name in strings.xml ───────────────────────────────────
      - name: Set app name
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">CodeAI IDE</string>|' "$STRINGS"
          fi

      # ── 12. Gradle permissions ─────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 13. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ── 14. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        id: rename
        run: |
          BUILD_DATE=$(date +%Y%m%d-%H%M)
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="CodeAI-IDE-${BUILD_DATE}-${SHORT_SHA}.apk"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "APK: ${APK_NAME}"

      # ── 15. Show APK info ──────────────────────────────────────────────────
      - name: APK info
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk")
          echo "APK path: $APK_PATH"
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"

      # ── 16. Upload artifact ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeAI-IDE-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 17. Create GitHub Release on version tags ──────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.release_name || github.ref_name }}
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          body: |
            ## CodeAI IDE ${{ github.ref_name }}

            ### Features
            - 🖊 VS Code-like editor powered by CodeMirror 6
            - 🐙 GitHub integration — browse, edit, commit & push
            - 🤖 AI coding assistant (Claude API)
            - 16 programming languages with syntax highlighting
            - Branch management, commit history

            ### Install
            1. Download `CodeAI-IDE-*.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK
            4. Connect GitHub with a Personal Access Token (repo scope)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
