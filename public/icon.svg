<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- Glow orb behind icon -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <!-- Left bracket < -->
  <g filter="url(#shadow)">
    <polyline
      points="195,136 108,256 195,376"
      fill="none"
      stroke="url(#bracket)"
      stroke-width="44"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Right bracket > -->
  <g filter="url(#shadow)">
    <polyline
      points="317,136 404,256 317,376"
      fill="none"
      stroke="url(#bracket)"
      stroke-width="44"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Forward slash / -->
  <g filter="url(#shadow)">
    <line
      x1="296" y1="148"
      x2="216" y2="364"
      stroke="url(#slash)"
      stroke-width="40"
      stroke-linecap="round"
    />
  </g>

  <!-- AI dot — bottom right accent -->
  <circle cx="394" cy="394" r="42" fill="#0d0d1a"/>
  <circle cx="394" cy="394" r="36" fill="url(#slash)" opacity="0.9"/>
  <text x="394" y="402" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="white">AI</text>
</svg>
